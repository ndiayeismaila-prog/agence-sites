<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#9B4444',
                        secondary: '#F5F1E6',
                        accent: '#D4AF37',
                        'dark-text': '#2C2C2C',
                        'light-text': '#FFFFFF',
                        surfaces: '#E8E2D6'
                    },
                    fontFamily: {
                        display: ['Playfair Display', 'serif'],
                        body: ['Inter', 'sans-serif'],

                }
            }
        }
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/framer-motion@10.16.4/dist/framer-motion.js"></script>
</head>
<body class="font-body text-dark-text">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.FramerMotion;

        const projet = {
            nom: "La Vieille Pie",
            description: "Bistrot coffee shop bar parisien authentique et moderne",
            url: "#",
            adresse: "12 Rue des Martyrs, 75009 Paris",
            telephone: "+33 1 42 34 56 78"
        };

        const horaires = {
            lundi_vendredi: "8h - 23h",
            samedi_dimanche: "9h - 00h",
            brunch: "Samedi & Dimanche 10h - 15h"
        };

        const menuData = [
            { id: '1', categorie: 'Cafés', nom: 'Espresso Artisanal', description: 'Café pur arabica torréfié sur place', prix: 3.5, image: 'https://images.unsplash.com/photo-1498804103079-a6351b050096' },
            { id: '2', categorie: 'Cafés', nom: 'Cappuccino Velours', description: 'Lait mousseux et cacao', prix: 4.8, image: 'https://images.unsplash.com/photo-1570197788417-0e82375c9371' },
            { id: '3', categorie: 'Pâtisseries', nom: 'Croissant Beurre', description: 'Fait maison chaque matin', prix: 2.8, image: 'https://images.unsplash.com/photo-1555507036-ab794f27d2e9' },
            { id: '4', categorie: 'Pâtisseries', nom: 'Tarte au Citron Meringuée', description: 'Équilibrée entre acidité et douceur', prix: 6.5, image: 'https://images.unsplash.com/photo-1565958011703-44f9829ba187' },
            { id: '5', categorie: 'Plats', nom: 'Croque-Monsieur Signature', description: 'Jambon de Paris, fromage comté, béchamel', prix: 12.5, image: 'https://images.unsplash.com/photo-1482049016688-2d3e1b311543' },
            { id: '6', categorie: 'Plats', nom: 'Salade Niçoise Revisité', description: 'Thon frais, œuf mollet, légumes de saison', prix: 14.9, image: 'https://images.unsplash.com/photo-1540189549336-e6e99c3679fe' },
            { id: '7', categorie: 'Cocktails', nom: 'Pie Martini', description: 'Gin, vermouth dry, zeste de citron', prix: 11, image: 'https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b' },
            { id: '8', categorie: 'Cocktails', nom: 'Spritz Parisien', description: 'Prosecco, Aperol, soda, orange', prix: 9.5, image: 'https://images.unsplash.com/photo-1628992682633-bf2d40cb595f' }
        ];

        const avisData = [
            { id: '1', auteur: 'Marie L.', note: 5, commentaire: 'Un véritable havre de paix au cœur de Paris. Les cafés sont exceptionnels et l'ambiance chaleureuse.', date: '2023-10-15' },
            { id: '2', auteur: 'Thomas P.', note: 4, commentaire: 'Brunch délicieux, service impeccable. Le croque-monsieur est à tomber !', date: '2023-10-10' },
            { id: '3', auteur: 'Sophie D.', note: 5, commentaire: 'Adore l'ambiance le soir. Les cocktails sont créatifs et la sélection de vins surprenante.', date: '2023-10-05' },
            { id: '4', auteur: 'Jean M.', note: 4, commentaire: 'Parfait pour une pause café ou un déjeuner rapide. Les pâtisseries maison sont un régal.', date: '2023-09-28' }
        ];

        const evenementsData = [
            { id: '1', titre: 'Soirée Jazz Vin', date: 'Vendredi 27 Octobre', description: 'Dégustation de vins naturels accompagnée d'un quartet de jazz.' },
            { id: '2', titre: 'Atelier Latte Art', date: 'Samedi 4 Novembre', description: 'Apprenez les secrets du latte art avec nos baristas.' }
        ];

        const cocktailsData = [
            { id: 'c1', nom: 'Pie Martini', description: 'Notre signature. Gin, vermouth dry, une touche de violette et zeste de citron.', prix: 11, image: 'https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b' },
            { id: 'c2', nom: 'Spritz Parisien', description: 'Prosecco, Aperol, soda, une tranche d'orange sanguine.', prix: 9.5, image: 'https://images.unsplash.com/photo-1628992682633-bf2d40cb595f' },
            { id: 'c3', nom: 'Nuit à Paris', description: 'Vodka, liqueur de mûre, jus de citron et sirop de basilic.', prix: 10.5, image: 'https://images.unsplash.com/photo-1609951651556-5334e2706168' }
        ];

        const faqData = [
            { question: 'Acceptez-vous les réservations ?', reponse: 'Oui, pour les groupes de 6 personnes ou plus. Pour les petites tables, nous fonctionnons à l'arrivée.' },
            { question: 'Avez-vous des options végétariennes ?', reponse: 'Absolument. Notre menu propose plusieurs plats et salades végétariens, et nous pouvons adapter sur demande.' },
            { question: 'Proposez-vous le service en terrasse ?', reponse: 'Oui, nous avons une terrasse chauffée de 12 places. Premier arrivé, premier servi.' }
        ];

        const imagesGalerie = [
            'https://images.unsplash.com/photo-1554118811-1e0d58224f24',
            'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4',
            'https://images.unsplash.com/photo-1578474846511-04ba529f0b88',
            'https://images.unsplash.com/photo-1414235077428-338989a2e8c0',
            'https://images.unsplash.com/photo-1559925393-8be0ec4767c8',
            'https://images.unsplash.com/photo-1565299624946-b28f40a0ae38'
        ];

        const IndicateurHoraire = ({ estOuvert }) => {
            const [heureActuelle, setHeureActuelle] = useState(new Date());

            useEffect(() => {
                const interval = setInterval(() => {
                    setHeureActuelle(new Date());
                }, 60000);
                return () => clearInterval(interval);
            }, []);

            const formatHeure = (date) => {
                return date.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
            };

            return (
                <motion.div
                    initial={{ opacity: 0, y: -10 }}
                    animate={{ opacity: 1, y: 0 }}
                    className="flex items-center gap-2"
                >
                    <div className={`w-3 h-3 rounded-full ${estOuvert ? 'bg-green-500' : 'bg-red-500'}`}></div>
                    <span className="text-sm font-medium">
                        {estOuvert ? 'Ouvert' : 'Fermé'} • {formatHeure(heureActuelle)}
                    </span>
                </motion.div>
            );
        };

        const Header = ({ estOuvert, onNavigation, pageActive }) => {
            const [menuMobileOuvert, setMenuMobileOuvert] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => {
                    setScrolled(window.scrollY > 20);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const pages = [
                { path: '/', label: 'Accueil' },
                { path: '/carte', label: 'Carte' },
                { path: '/brunch', label: 'Brunch' },
                { path: '/bar', label: 'Bar' },
                { path: '/reservation', label: 'Réservation' },
                { path: '/contact', label: 'Contact' }
            ];

            return (
                <motion.header
                    initial={{ y: -100 }}
                    animate={{ y: 0 }}
                    className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${scrolled ? 'bg-white shadow-md py-2' : 'bg-white/95 backdrop-blur-sm py-4'}`}
                >
                    <div className="container mx-auto px-4">
                        <div className="flex items-center justify-between">
                            <motion.div
                                whileHover={{ scale: 1.05 }}
                                className="flex items-center gap-2 cursor-pointer"
                                onClick={() => onNavigation('/')}
                            >
                                <div className="w-10 h-10 bg-primary rounded-full flex items-center justify-center">
                                    <span className="text-white font-display font-bold text-xl">VP</span>
                                </div>
                                <span className="font-display text-2xl font-bold text-dark-text hidden md:block">{projet.nom}</span>
                            </motion.div>

                            <nav className="hidden md:flex items-center gap-8">
                                {pages.map((page) => (
                                    <motion.button
                                        key={page.path}
                                        whileHover={{ scale: 1.05 }}
                                        whileTap={{ scale: 0.95 }}
                                        className={`font-medium transition-colors ${pageActive === page.path ? 'text-primary border-b-2 border-primary' : 'text-dark-text hover:text-primary'}`}
                                        onClick={() => onNavigation(page.path)}
                                    >
                                        {page.label}
                                    </motion.button>
                                ))}
                            </nav>

                            <div className="hidden md:flex items-center gap-4">
                                <IndicateurHoraire estOuvert={estOuvert} />
                            </div>

                            <button
                                className="md:hidden text-dark-text"
                                onClick={() => setMenuMobileOuvert(!menuMobileOuvert)}
                            >
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    {menuMobileOuvert ? (
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                    ) : (
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />
                                    )}
                                </svg>
                            </button>
                        </div>

                        <AnimatePresence>
                            {menuMobileOuvert && (
                                <motion.div
                                    initial={{ opacity: 0, height: 0 }}
                                    animate={{ opacity: 1, height: 'auto' }}
                                    exit={{ opacity: 0, height: 0 }}
                                    className="md:hidden mt-4 pb-4"
                                >
                                    {pages.map((page) => (
                                        <motion.button
                                            key={page.path}
                                            whileTap={{ scale: 0.95 }}
                                            className={`block w-full text-left py-2 px-4 ${pageActive === page.path ? 'text-primary font-semibold' : 'text-dark-text'}`}
                                            onClick={() => {
                                                onNavigation(page.path);
                                                setMenuMobileOuvert(false);
                                            }}
                                        >
                                            {page.label}
                                        </motion.button>
                                    ))}
                                    <div className="mt-4 px-4">
                                        <IndicateurHoraire estOuvert={estOuvert} />
                                    </div>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </div>
                </motion.header>
            );
        };

        const Hero = ({ onNavigationVersReservation }) => {
            return (
                <section className="relative h-screen flex items-center justify-center overflow-hidden">
                    <div className="absolute inset-0 z-0">
                        <img
                            src="https://images.unsplash.com/photo-1554118811-1e0d58224f24"
                            alt="La Vieille Pie"
                            className="w-full h-full object-cover"
                        />
                        <div className="absolute inset-0 bg-gradient-to-b from-black/60 to-black/40"></div>
                    </div>

                    <div className="relative z-10 text-center text-white px-4">
                        <motion.h1
                            initial={{ opacity: 0, y: 30 }}
                            animate={{ opacity: 1, y: 0 }}
                            transition={{ duration: 0.8 }}
                            className="font-display text-5xl md:text-7xl font-bold mb-6"
                        >
                            {projet.nom}
                        </motion.h1>

                        <motion.p
                            initial={{ opacity: 0, y: 30 }}
                            animate={{ opacity: 1, y: 0 }}
                            transition={{ duration: 0.8, delay: 0.2 }}
                            className="font-accent text-xl md:text-2xl mb-8 max-w-2xl mx-auto"
                        >
                            {projet.description}
                        </motion.p>

                        <motion.div
                            initial={{ opacity: 0, y: 30 }}
                            animate={{ opacity: 1, y: 0 }}
                            transition={{ duration: 0.8, delay: 0.4 }}
                            className="flex flex-col sm:flex-row gap-4 justify-center"
                        >
                            <motion.button
                                whileHover={{ scale: 1.05 }}
                                whileTap={{ scale: 0.95 }}
                                className="bg-primary text-white px-8 py-3 rounded-full font-semibold hover:bg-primary/90 transition"
                                onClick={onNavigationVersReservation}
                            >
                                Réserver une table
                            </motion.button>

                            <motion.button
                                whileHover={{ scale: 1.05 }}
                                whileTap={{ scale: 0.95 }}
                                className="bg-white text-primary px-8 py-3 rounded-full font-semibold hover:bg-secondary transition"
                            >
                                Voir la carte
                            </motion.button>
                        </motion.div>
                    </div>

                    <motion.div
                        initial={{ opacity: 0 }}
                        animate={{ opacity: 1 }}
                        transition={{ delay: 1.5 }}
                        className="absolute bottom-8 left-1/2 transform -translate-x-1/2"
                    >
                        <motion.div
                            animate={{ y: [0, 10, 0] }}
                            transition={{ duration: 1.5, repeat: Infinity }}
                        >
                            <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                            </svg>
                        </motion.div>
                    </motion.div>
                </section>
            );
        };

        const CardMenu = ({ item }) => {
            return (
                <motion.div
                    initial={{ opacity: 0, y: 20 }}
                    whileInView={{ opacity: 1, y: 0 }}
                    viewport={{ once: true }}
                    whileHover={{ y: -5 }}
                    className="bg-white rounded-lg overflow-hidden shadow-lg"
                >
                    <div className="relative h-48 overflow-hidden">
                        <img
                            src={item.image}
                            alt={item.nom}
                            className="w-full h-full object-cover transform hover:scale-110 transition-transform duration-500"
                        />
                    </div>
                    <div className="p-6">
                        <div className="flex justify-between items-start mb-2">
                            <h3 className="font-display text-xl font-semibold text-dark-text">{item.nom}</h3>
                            <span className="text-primary font-bold text-lg">{item.prix}€</span>
                        </div>
                        <p className="text-gray-600 text-sm">{item.description}</p>
                        <span className="inline-block mt-3 text-xs bg-surfaces text-dark-text px-3 py-1 rounded-full">
                            {item.categorie}
                        </span>
                    </div>
                </motion.div>
            );
        };

        const SectionMenu = () => {
            const [categorieActive, setCategorieActive] = useState('Tous');
            const categories = ['Tous', 'Cafés', 'Pâtisseries', 'Plats', 'Cocktails'];

            const menuFiltre = categorieActive === 'Tous' 
                ? menuData 
                : menuData.filter(item => item.categorie === categorieActive);

            return (
                <section className="py-20 bg-secondary" id="carte">
                    <div className="container mx-auto px-4">
                        <motion.div
                            initial={{ opacity: 0, y: 20 }}
                            whileInView={{ opacity: 1, y: 0 }}
                            viewport={{ once: true }}
                            className="text-center mb-12"
                        >
                            <h2 className="font-display text-4xl md:text-5xl font-bold text-dark-text mb-4">Notre Carte</h2>
                            <p className="text-gray-600 max-w-2xl mx-auto">
                                Des produits frais et de saison, une cuisine authentique et créative
                            </p>
                        </motion.div>

                        <div className="flex flex-wrap justify-center gap-4 mb-12">
                            {categories.map((cat) => (
                                <motion.button
                                    key={cat}
                                    whileHover={{ scale: 1.05 }}
                                    whileTap={{ scale: 0.95 }}
                                    onClick={() => setCategorieActive(cat)}
                                    className={`px-6 py-2 rounded-full font-medium transition-all ${
                                        categorieActive === cat
                                            ? 'bg-primary text-white'
                                            : 'bg-white text-dark-text hover:bg-surfaces'
                                    }`}
                                >
                                    {cat}
                                </motion.button>
                            ))}
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            <AnimatePresence mode="wait">
                                {menuFiltre.map((item) => (
                                    <CardMenu key={item.id} item={item} />
                                ))}
                            </AnimatePresence>
                        </div>
                    </div>
                </section>
            );
        };

        const CardAvis = ({ avis }) => {
            const etoiles = Array.from({ length: 5 }, (_, i) => i < avis.note);

            return (
                <motion.div
                    initial={{ opacity: 0, scale: 0.9 }}
                    whileInView={{ opacity: 1, scale: 1 }}
                    viewport={{ once: true }}
                    className="bg-white p-6 rounded-lg shadow-md"
                >
                    <div className="flex items-center gap-1 mb-3">
                        {etoiles.map((rempli, i) => (
                            <svg
                                key={i}
                                className={`w-5 h-5 ${rempli ? 'text-accent' : 'text-gray-300'}`}
                                fill="currentColor"
                                viewBox="0 0 20 20"
                            >
                                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                            </svg>
                        ))}
                    </div>
                    <p className="text-gray-700 mb-4 italic">"{avis.commentaire}"</p>
                    <div className="flex justify-between items-center text-sm">
                        <span className="font-semibold text-dark-text">{avis.auteur}</span>
                        <span className="text-gray-500">{new Date(avis.date).toLocaleDateString('fr-FR')}</span>
                    </div>
                </motion.div>
            );
        };

        const SectionAvis = () => {
            const avisMoyen = (avisData.reduce((acc, a) => acc + a.note, 0) / avisData.length).toFixed(1);

            return (
                <section className="py-20 bg-white">
                    <div className="container mx-auto px-4">
                        <motion.div
                            initial={{ opacity: 0, y: 20 }}
                            whileInView={{ opacity: 1, y: 0 }}
                            viewport={{ once: true }}
                            className="text-center mb-12"
                        >
                            <h2 className="font-display text-4xl md:text-5xl font-bold text-dark-text mb-4">Avis Clients</h2>
                            <div className="flex items-center justify-center gap-2 mb-4">
                                <span className="text-3xl font-bold text-primary">{avisMoyen}</span>
                                <div className="flex">
                                    {Array.from({ length: 5 }, (_, i) => (
                                        <svg
                                            key={i}
                                            className={`w-6 h-6 ${i < Math.round(avisMoyen) ? 'text-accent' : 'text-gray-300'}`}
                                            fill="currentColor"
                                            viewBox="0 0 20 20"
                                        >
                                            <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                                        </svg>
                                    ))}
                                </div>
                            </div>
                            <p className="text-gray-600">Basé sur {avisData.length} avis</p>
                        </motion.div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            {avisData.map((avis) => (
                                <CardAvis key={avis.id} avis={avis} />
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const SectionEvenements = () => {
            return (
                <section className="py-20 bg-surfaces">
                    <div className="container mx-auto px-4">
                        <motion.div
                            initial={{ opacity: 0, y: 20 }}
                            whileInView={{ opacity: 1, y: 0 }}
                            viewport={{ once: true }}
                            className="text-center mb-12"
                        >
                            <h2 className="font-display text-4xl md:text-5xl font-bold text-dark-text mb-4">Événements à Venir</h2>
                            <p className="text-gray-600">Ne manquez pas nos soirées spéciales</p>
                        </motion.div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl mx-auto">
                            {evenementsData.map((event) => (
                                <motion.div
                                    key={event.id}
                                    initial={{ opacity: 0, scale: 0.9 }}
                                    whileInView={{ opacity: 1, scale: 1 }}
                                    viewport={{ once: true }}
                                    whileHover={{ scale: 1.02 }}
                                    className="bg-white p-8 rounded-lg shadow-md border-l-4 border-primary"
                                >
                                    <span className="text-accent font-semibold text-sm">{event.date}</span>
                                    <h3 className="font-display text-2xl font-bold text-dark-text mt-2 mb-3">{event.titre}</h3>
                                    <p className="text-gray-600">{event.description}</p>
                                    <motion.button
                                        whileHover={{ scale: 1.05 }}
                                        whileTap={{ scale: 0.95 }}
                                        className="mt-4 text-primary font-semibold hover:underline"
                                    >
                                        En savoir plus →
                                    </motion.button>
                                </motion.div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const SectionGalerie = () => {
            return (
                <section className="py-20 bg-white">
                    <div className="container mx-auto px-4">
                        <motion.div
                            initial={{ opacity: 0, y: 20 }}
                            whileInView={{ opacity: 1, y: 0 }}
                            viewport={{ once: true }}
                            className="text-center mb-12"
                        >
                            <h2 className="font-display text-4xl md:text-5xl font-bold text-dark-text mb-4">Galerie</h2>
                            <p className="text-gray-600">Découvrez l'atmosphère unique
