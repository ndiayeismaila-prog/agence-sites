<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Vieille Pie - Bistrot Parisien Authentique</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --couleur-principale: #2C1810;
            --couleur-secondaire: #D4AF37;
            --couleur-fond: #F9F7F4;
            --couleur-texte: #333333;
            --couleur-texte-clair: #777777;
            --couleur-blanc: #FFFFFF;
            --couleur-overlay: rgba(44, 24, 16, 0.7);
            --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --ombre-portee: 0 10px 30px rgba(44, 24, 16, 0.08);
            --ombre-portee-forte: 0 15px 40px rgba(44, 24, 16, 0.15);
            --radius: 8px;
            --radius-grand: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--couleur-texte);
            background-color: var(--couleur-fond);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, h4 {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            color: var(--couleur-principale);
            line-height: 1.3;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: var(--transition);
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        section {
            padding: 80px 0;
        }

        .section-title {
            text-align: center;
            margin-bottom: 60px;
            position: relative;
        }

        .section-title h2 {
            font-size: 2.5rem;
            display: inline-block;
            margin-bottom: 15px;
        }

        .section-title h2::after {
            content: '';
            position: absolute;
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, var(--couleur-principale), var(--couleur-secondaire));
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 2px;
        }

        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, var(--couleur-principale), #3e2419);
            color: var(--couleur-blanc);
            border: none;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--ombre-portee);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--couleur-secondaire), #e6c158);
            transition: left 0.4s ease;
            z-index: -1;
        }

        .btn:hover::before {
            left: 0;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: var(--ombre-portee-forte);
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--couleur-secondaire), #e6c158);
            color: var(--couleur-principale);
        }

        .btn-secondary::before {
            background: linear-gradient(135deg, var(--couleur-principale), #3e2419);
        }

        /* Navigation */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            transition: var(--transition);
            padding: 20px 0;
            background-color: rgba(255, 255, 255, 0.95);
        }

        header.scrolled {
            background-color: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 5px 20px rgba(44, 24, 16, 0.1);
            padding: 15px 0;
        }

        nav .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--couleur-principale);
            display: flex;
            align-items: center;
        }

        .logo i {
            color: var(--couleur-secondaire);
            margin-right: 8px;
            font-size: 1.5rem;
        }

        .nav-links {
            display: flex;
            list-style: none;
        }

        .nav-links li {
            margin-left: 30px;
        }

        .nav-links a {
            font-weight: 500;
            position: relative;
            padding: 5px 0;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            background-color: var(--couleur-secondaire);
            bottom: 0;
            left: 0;
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }

        .nav-cta {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--couleur-principale);
            cursor: pointer;
        }

        /* Hero */
        .hero {
            height: 100vh;
            min-height: 700px;
            display: flex;
            align-items: center;
            position: relative;
            background: linear-gradient(rgba(44, 24, 16, 0.7), rgba(44, 24, 16, 0.5)), url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80') no-repeat center center/cover;
            color: var(--couleur-blanc);
            margin-top: 0;
            padding-top: 0;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            animation: fadeUp 1s ease-out;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero h1 {
            font-size: 3.5rem;
            color: var(--couleur-blanc);
            margin-bottom: 20px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .hero .sous-titre {
            font-size: 1.5rem;
            color: var(--couleur-secondaire);
            margin-bottom: 25px;
            font-weight: 400;
        }

        .hero .description {
            font-size: 1.2rem;
            margin-bottom: 40px;
            max-width: 600px;
            opacity: 0.9;
        }

        /* Présentation */
        .presentation {
            display: flex;
            align-items: center;
            gap: 60px;
            flex-wrap: wrap;
        }

        .presentation-image {
            flex: 1;
            min-width: 300px;
            border-radius: var(--radius-grand);
            overflow: hidden;
            box-shadow: var(--ombre-portee-forte);
            transform: rotate(-2deg);
            transition: var(--transition);
        }

        .presentation-image:hover {
            transform: rotate(0deg);
        }

        .presentation-image img {
            width: 100%;
            height: 500px;
            object-fit: cover;
            display: block;
        }

        .presentation-content {
            flex: 1;
            min-width: 300px;
        }

        .presentation-content h2 {
            font-size: 2.2rem;
            margin-bottom: 25px;
        }

        .presentation-content p {
            font-size: 1.1rem;
            color: var(--couleur-texte-clair);
            margin-bottom: 30px;
        }

        /* Spécialités */
        .specialites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .specialite-card {
            background: var(--couleur-blanc);
            border-radius: var(--radius-grand);
            overflow: hidden;
            box-shadow: var(--ombre-portee);
            transition: var(--transition);
        }

        .specialite-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--ombre-portee-forte);
        }

        .specialite-image {
            height: 200px;
            width: 100%;
            object-fit: cover;
        }

        .specialite-content {
            padding: 25px;
        }

        .specialite-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .specialite-header h3 {
            font-size: 1.4rem;
            margin: 0;
        }

        .specialite-prix {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--couleur-secondaire);
        }

        .specialite-description {
            color: var(--couleur-texte-clair);
        }

        /* Horaires */
        .horaires {
            background: linear-gradient(rgba(44, 24, 16, 0.05), rgba(44, 24, 16, 0.05));
            border-radius: var(--radius-grand);
            padding: 50px;
            text-align: center;
        }

        .horaires h2 {
            margin-bottom: 40px;
        }

        .horaires-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            max-width: 600px;
            margin: 0 auto;
        }

        .horaire-item {
            background: var(--couleur-blanc);
            padding: 25px;
            border-radius: var(--radius);
            box-shadow: var(--ombre-portee);
        }

        .horaire-jours {
            font-weight: 600;
            color: var(--couleur-principale);
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .horaire-heures {
            font-size: 1.3rem;
            color: var(--couleur-secondaire);
            font-weight: 700;
        }

        .statut-ouvert {
            display: inline-block;
            background-color: #2ecc71;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 600;
            margin-top: 30px;
            font-size: 0.9rem;
        }

        /* Menu */
        .menu-categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .menu-categorie {
            background: var(--couleur-blanc);
            border-radius: var(--radius-grand);
            overflow: hidden;
            box-shadow: var(--ombre-portee);
            transition: var(--transition);
        }

        .menu-categorie:hover {
            transform: translateY(-5px);
        }

        .menu-categorie-image {
            height: 180px;
            width: 100%;
            object-fit: cover;
        }

        .menu-categorie-content {
            padding: 25px;
        }

        .menu-categorie h3 {
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: var(--couleur-secondaire);
        }

        .menu-items {
            list-style: none;
        }

        .menu-items li {
            padding: 10px 0;
            border-bottom: 1px dashed #eee;
            display: flex;
            justify-content: space-between;
        }

        .menu-items li:last-child {
            border-bottom: none;
        }

        /* Brunch */
        .brunch-detail {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.05), rgba(44, 24, 16, 0.05));
            border-radius: var(--radius-grand);
            padding: 60px;
            display: flex;
            align-items: center;
            gap: 60px;
            flex-wrap: wrap;
        }

        .brunch-image {
            flex: 1;
            min-width: 300px;
            border-radius: var(--radius-grand);
            overflow: hidden;
            box-shadow: var(--ombre-portee-forte);
        }

        .brunch-image img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            display: block;
        }

        .brunch-content {
            flex: 1;
            min-width: 300px;
        }

        .brunch-content h2 {
            font-size: 2.2rem;
            margin-bottom: 15px;
        }

        .brunch-prix {
            font-size: 2rem;
            color: var(--couleur-secondaire);
            font-weight: 700;
            margin-bottom: 10px;
        }

        .brunch-horaires {
            font-size: 1.1rem;
            color: var(--couleur-texte-clair);
            margin-bottom: 30px;
            font-weight: 500;
        }

        .brunch-inclus {
            list-style: none;
            margin-bottom: 30px;
        }

        .brunch-inclus li {
            padding: 10px 0;
            padding-left: 30px;
            position: relative;
        }

        .brunch-inclus li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: var(--couleur-secondaire);
            font-weight: bold;
        }

        /* Galerie */
        .galerie-categories {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .galerie-btn {
            padding: 10px 25px;
            background: var(--couleur-blanc);
            border: 1px solid #ddd;
            border-radius: 50px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .galerie-btn.active,
        .galerie-btn:hover {
            background: var(--couleur-principale);
            color: var(--couleur-blanc);
            border-color: var(--couleur-principale);
        }

        .galerie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .galerie-item {
            border-radius: var(--radius);
            overflow: hidden;
            height: 250px;
            position: relative;
            cursor: pointer;
        }

        .galerie-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .galerie-item:hover img {
            transform: scale(1.05);
        }

        .galerie-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            color: white;
            padding: 20px;
            transform: translateY(100%);
            transition: var(--transition);
        }

        .galerie-item:hover .galerie-overlay {
            transform: translateY(0);
        }

        /* Avis */
        .avis-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .avis-slider {
            display: flex;
            gap: 30px;
            overflow-x: auto;
            padding: 20px 0;
            scrollbar-width: thin;
            scrollbar-color: var(--couleur-secondaire) #f1f1f1;
        }

        .avis-slider::-webkit-scrollbar {
            height: 8px;
        }
