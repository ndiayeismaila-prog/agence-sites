<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Vieille Pie - Bistrot • Coffee Shop • Bar - Paris 18ème</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #c9a961;
            --primary-dark: #a88942;
            --secondary: #2c2416;
            --accent: #d4af37;
            --dark: #1a1410;
            --light: #f8f5f0;
            --gray: #8b8680;
            --white: #ffffff;
            --gradient: linear-gradient(135deg, #c9a961 0%, #d4af37 100%);
            --gradient-dark: linear-gradient(135deg, #2c2416 0%, #1a1410 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            color: var(--secondary);
            background-color: var(--light);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            line-height: 1.2;
        }

        .nav-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .nav-header.scrolled {
            padding: 0;
            background: rgba(255, 255, 255, 0.98);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--secondary);
            text-decoration: none;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
        }

        .logo span {
            color: var(--primary);
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 2.5rem;
            align-items: center;
        }

        .nav-menu a {
            color: var(--secondary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-menu a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--gradient);
            transition: width 0.3s ease;
        }

        .nav-menu a:hover::after,
        .nav-menu a.active::after {
            width: 100%;
        }

        .burger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
            z-index: 1001;
        }

        .burger span {
            width: 25px;
            height: 3px;
            background: var(--secondary);
            transition: all 0.3s ease;
        }

        .burger.active span:nth-child(1) {
            transform: rotate(45deg) translate(6px, 6px);
        }

        .burger.active span:nth-child(2) {
            opacity: 0;
        }

        .burger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(6px, -6px);
        }

        .hero-section {
            position: relative;
            height: 100vh;
            min-height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--white);
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: scroll;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(26, 20, 16, 0.85) 0%, rgba(44, 36, 22, 0.75) 100%);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 900px;
            padding: 2rem;
            animation: fadeInUp 1s ease;
        }

        .hero-content h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            letter-spacing: 2px;
        }

        .hero-subtitle {
            font-size: clamp(1rem, 3vw, 1.5rem);
            margin-bottom: 1.5rem;
            color: var(--primary);
            font-weight: 600;
            letter-spacing: 3px;
        }

        .hero-text {
            font-size: clamp(1rem, 2vw, 1.2rem);
            margin-bottom: 2.5rem;
            line-height: 1.8;
            opacity: 0.95;
        }

        .btn-primary {
            display: inline-block;
            padding: 1.2rem 3rem;
            background: var(--gradient);
            color: var(--white);
            text-decoration: none;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.4s ease;
            box-shadow: 0 10px 30px rgba(201, 169, 97, 0.3);
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(201, 169, 97, 0.5);
        }

        .btn-secondary {
            display: inline-block;
            padding: 1.2rem 3rem;
            background: transparent;
            color: var(--white);
            text-decoration: none;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.4s ease;
            border: 2px solid var(--primary);
            cursor: pointer;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-secondary:hover {
            background: var(--primary);
            transform: translateY(-3px);
        }

        .section {
            padding: 6rem 2rem;
            opacity: 1;
            transform: translateY(0);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .section-title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin-bottom: 1rem;
            color: var(--secondary);
        }

        .section-subtitle {
            font-size: clamp(1rem, 2vw, 1.3rem);
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 1.5rem;
            letter-spacing: 2px;
        }

        .section-text {
            font-size: clamp(1rem, 1.5vw, 1.1rem);
            color: var(--gray);
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.8;
        }

        .presentation-section {
            background: var(--white);
        }

        .presentation-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .presentation-image {
            width: 100%;
            height: 500px;
            border-radius: 20px;
            object-fit: cover;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            transition: transform 0.5s ease;
        }

        .presentation-image:hover {
            transform: scale(1.02);
        }

        .specialites-section {
            background: var(--light);
        }

        .specialites-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3rem;
            margin-top: 4rem;
        }

        .specialite-card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
        }

        .specialite-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .specialite-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .specialite-card:hover .specialite-image {
            transform: scale(1.05);
        }

        .specialite-content {
            padding: 2rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .specialite-content h3 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: var(--secondary);
        }

        .specialite-content p {
            color: var(--gray);
            line-height: 1.8;
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        .horaires-section {
            background: var(--gradient-dark);
            color: var(--white);
        }

        .horaires-section .section-title,
        .horaires-section .section-subtitle {
            color: var(--white);
        }

        .horaires-section .section-subtitle {
            color: var(--primary);
        }

        .horaires-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            margin-top: 3rem;
            align-items: center;
        }

        .horaires-list {
            background: rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .horaires-list p {
            font-size: 1.2rem;
            line-height: 2;
            white-space: pre-line;
        }

        .cta-final-section {
            background-image: url('https://images.unsplash.com/photo-1559925393-8be0ec4767c8?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: scroll;
            position: relative;
            color: var(--white);
        }

        .cta-final-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(26, 20, 16, 0.9) 0%, rgba(44, 36, 22, 0.85) 100%);
        }

        .cta-final-content {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .menu-introduction {
            background: var(--white);
        }

        .menu-card {
            background: var(--light);
            padding: 3rem;
            border-radius: 20px;
            margin-bottom: 3rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease;
        }

        .menu-card:hover {
            transform: translateY(-5px);
        }

        .menu-card h3 {
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            margin-bottom: 1rem;
            color: var(--secondary);
        }

        .menu-card h4 {
            font-size: clamp(1.2rem, 2vw, 1.5rem);
            color: var(--primary);
            margin-bottom: 1.5rem;
        }

        .menu-price {
            font-size: clamp(1.5rem, 3vw, 2rem);
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .menu-description {
            color: var(--gray);
            line-height: 1.8;
            white-space: pre-line;
            margin-bottom: 2rem;
        }

        #galerie {
            background: var(--light);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-top: 3rem;
        }

        .gallery-item {
            position: relative;
            height: 400px;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .gallery-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, transparent 100%);
            padding: 2rem;
            color: var(--white);
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover .gallery-overlay {
            transform: translateY(0);
        }

        .contact-section {
            background: var(--white);
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            margin-top: 3rem;
        }

        .contact-info {
            background: var(--light);
            padding: 3rem;
            border-radius: 20px;
        }

        .contact-info h3 {
            font-size: clamp(1.5rem, 3vw, 2rem);
            margin-bottom: 2rem;
            color: var(--secondary);
        }

        .contact-detail {
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid #ddd;
        }

        .contact-detail:last-child {
            border-bottom: none;
        }

        .contact-detail h4 {
            font-size: clamp(1.1rem, 2vw, 1.3rem);
            margin-bottom: 0.5rem;
            color: var(--primary);
        }

        .contact-detail p {
            color: var(--gray);
            line-height: 1.8;
            white-space: pre-line;
        }

        .contact-form {
            background: var(--light);
            padding: 3rem;
            border-radius: 20px;
        }

        .form-group {
            margin-bottom: 2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--secondary);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 1rem;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: var(--white);
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(201, 169, 97, 0.2);
