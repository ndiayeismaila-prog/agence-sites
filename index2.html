<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Vieille Pie - Bistrot Parisien Authentique</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --couleur-principale: #2C1810;
            --couleur-secondaire: #D4AF37;
            --couleur-fond: #F9F7F4;
            --couleur-texte: #333333;
            --couleur-texte-clair: #777777;
            --couleur-blanc: #FFFFFF;
            --couleur-overlay: rgba(44, 24, 16, 0.7);
            --transition: all 0.3s ease;
            --ombre-portee: 0 10px 30px rgba(0, 0, 0, 0.08);
            --ombre-portee-forte: 0 15px 40px rgba(0, 0, 0, 0.12);
            --radius: 12px;
            --radius-petit: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--couleur-texte);
            background-color: var(--couleur-fond);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, h4 {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            color: var(--couleur-principale);
            line-height: 1.3;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        section {
            padding: 80px 0;
        }

        /* Navigation */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.05);
            transition: var(--transition);
        }

        .navbar.scrolled {
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--couleur-principale);
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .logo i {
            color: var(--couleur-secondaire);
            margin-right: 8px;
        }

        .nav-menu {
            display: flex;
            list-style: none;
        }

        .nav-item {
            margin-left: 30px;
        }

        .nav-link {
            color: var(--couleur-principale);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: var(--transition);
            position: relative;
            padding: 5px 0;
        }

        .nav-link:hover {
            color: var(--couleur-secondaire);
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--couleur-secondaire);
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .nav-cta {
            background: linear-gradient(135deg, var(--couleur-principale), #3a241a);
            color: white;
            padding: 10px 22px;
            border-radius: var(--radius-petit);
            font-weight: 600;
            transition: var(--transition);
            box-shadow: var(--ombre-portee);
        }

        .nav-cta:hover {
            background: linear-gradient(135deg, #3a241a, var(--couleur-principale));
            transform: translateY(-2px);
            box-shadow: var(--ombre-portee-forte);
            color: white;
        }

        .mobile-toggle {
            display: none;
            font-size: 1.5rem;
            color: var(--couleur-principale);
            cursor: pointer;
            background: none;
            border: none;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            min-height: 700px;
            background: linear-gradient(var(--couleur-overlay), var(--couleur-overlay)), url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            position: relative;
            margin-top: 0;
        }

        .hero-content {
            max-width: 700px;
            color: var(--couleur-blanc);
            z-index: 2;
            animation: fadeUp 1s ease-out;
        }

        .hero h1 {
            font-size: 4rem;
            color: var(--couleur-blanc);
            margin-bottom: 15px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .hero-subtitle {
            font-size: 1.5rem;
            color: var(--couleur-secondaire);
            margin-bottom: 20px;
            font-weight: 400;
        }

        .hero-description {
            font-size: 1.1rem;
            margin-bottom: 35px;
            opacity: 0.9;
            max-width: 600px;
        }

        .btn {
            display: inline-block;
            padding: 16px 32px;
            border-radius: var(--radius-petit);
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition);
            cursor: pointer;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--couleur-secondaire), #b8941f);
            color: var(--couleur-principale);
            box-shadow: var(--ombre-portee);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: var(--ombre-portee-forte);
        }

        .btn-secondary {
            background: transparent;
            color: var(--couleur-blanc);
            border: 2px solid rgba(255, 255, 255, 0.3);
            margin-left: 15px;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--couleur-blanc);
        }

        /* Section Styles */
        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 20px;
            position: relative;
            padding-bottom: 15px;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: var(--couleur-secondaire);
        }

        .section-subtitle {
            text-align: center;
            color: var(--couleur-texte-clair);
            max-width: 700px;
            margin: 0 auto 50px;
            font-size: 1.1rem;
        }

        /* Présentation */
        .presentation {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .presentation-image {
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--ombre-portee-forte);
            height: 400px;
        }

        .presentation-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .presentation-image:hover img {
            transform: scale(1.05);
        }

        .presentation-content h2 {
            font-size: 2.2rem;
            margin-bottom: 20px;
        }

        .presentation-content p {
            font-size: 1.05rem;
            color: var(--couleur-texte-clair);
            margin-bottom: 25px;
        }

        /* Spécialités */
        .specialites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .specialite-card {
            background: var(--couleur-blanc);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--ombre-portee);
            transition: var(--transition);
        }

        .specialite-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--ombre-portee-forte);
        }

        .specialite-image {
            height: 200px;
            overflow: hidden;
        }

        .specialite-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .specialite-card:hover .specialite-image img {
            transform: scale(1.1);
        }

        .specialite-content {
            padding: 25px;
        }

        .specialite-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .specialite-header h3 {
            font-size: 1.4rem;
            margin: 0;
        }

        .specialite-prix {
            color: var(--couleur-secondaire);
            font-weight: 700;
            font-size: 1.2rem;
        }

        .specialite-description {
            color: var(--couleur-texte-clair);
        }

        /* Horaires */
        .horaires {
            background: linear-gradient(rgba(44, 24, 16, 0.9), rgba(44, 24, 16, 0.9)), url('https://images.unsplash.com/photo-1559925393-8be0ec4767c8?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            color: var(--couleur-blanc);
            text-align: center;
            border-radius: var(--radius);
            padding: 60px;
            margin-top: 40px;
        }

        .horaires h2 {
            color: var(--couleur-blanc);
            margin-bottom: 30px;
        }

        .horaires-list {
            max-width: 500px;
            margin: 0 auto;
        }

        .horaire-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .horaire-item:last-child {
            border-bottom: none;
        }

        .statut-temps-reel {
            display: inline-flex;
            align-items: center;
            background: rgba(212, 175, 55, 0.2);
            color: var(--couleur-secondaire);
            padding: 8px 16px;
            border-radius: 50px;
            margin-top: 25px;
            font-weight: 600;
        }

        .statut-temps-reel i {
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        /* Menu */
        .menu-categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .menu-category {
            background: var(--couleur-blanc);
            border-radius: var(--radius);
            padding: 30px;
            box-shadow: var(--ombre-portee);
            transition: var(--transition);
        }

        .menu-category:hover {
            transform: translateY(-5px);
            box-shadow: var(--ombre-portee-forte);
        }

        .menu-category h3 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--couleur-secondaire);
        }

        .menu-items {
            list-style: none;
        }

        .menu-item {
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        /* Brunch */
        .brunch-detail {
            background: var(--couleur-blanc);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--ombre-portee-forte);
            max-width: 900px;
            margin: 0 auto;
        }

        .brunch-header {
            background: linear-gradient(135deg, var(--couleur-principale), #3a241a);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .brunch-header h2 {
            color: white;
            margin-bottom: 10px;
        }

        .brunch-prix {
            font-size: 2rem;
            color: var(--couleur-secondaire);
            font-weight: 700;
            margin: 10px 0;
        }

        .brunch-horaires {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .brunch-content {
            padding: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
        }

        .brunch-inclus {
            list-style: none;
        }

        .brunch-inclus li {
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            position: relative;
            padding-left: 30px;
        }

        .brunch-inclus li:last-child {
            border-bottom: none;
        }

        .brunch-inclus li i {
            color: var(--couleur-secondaire);
            position: absolute;
            left: 0;
            top: 14px;
        }

        .brunch-image {
            border-radius: var(--radius);
            overflow: hidden;
            height: 300px;
        }

        .brunch-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Galerie */
        .galerie-filters {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 40px;
        }

        .filter-btn {
            background: var(--couleur-blanc);
            border: 1px solid #ddd;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
        }

        .filter-btn.active, .filter-btn:hover {
            background: var(--couleur-principale);
            color: white;
            border-color: var(--couleur-principale);
        }

        .galerie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .galerie-item {
            border-radius: var(--radius);
            overflow: hidden;
            height: 250px;
            position: relative;
            cursor: pointer;
        }

        .galerie-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .galerie-item:hover img {
            transform: scale(1.1);
        }

        .galerie-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.7));
            color: white;
            padding: 20px;
            transform: translateY(10px);
            opacity: 0;
            transition: var(--transition);
        }

        .galerie-item:hover .galerie-overlay {
            transform: translateY(0);
            opacity: 1;
        }

        /* Avis */
        .avis-container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        .avis-slider {
